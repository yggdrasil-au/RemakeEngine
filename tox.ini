[tox]
envlist = py311
skipsdist = True

[testenv]
deps = -rrequirements.txt

commands =
    coverage run -m pytest
    coverage xml

[coverage:run]
branch = True
relative_files = True
source =
    .
    Source
    Utils
    Tools
    RemakeRegistry

[coverage:report]
omit =
    */OldModules/*
    */OldRemakeRegistry/*
    */reverse_engineering_docs/*
    */Tools/Blender/*
    */tests/*
