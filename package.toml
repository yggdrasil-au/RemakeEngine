
[project]
name = "remakeengine"
version = "1.7.1"
description = ""
author = "samarixum (YGGDRASIL)"
license = "Custom Non-Commercial"

[scripts]
build = "{maker-run-scripts} build-main build-dev"
build-main = "pyinstaller --onefile --paths=./Engine --paths=. ./main.py --distpath ./"
build-dev = "pyinstaller --onefile --paths=./Engine --paths=. maker --distpath ./"
cleanBuild = "{delete} build main.spec maker.spec"

[dependencies.python]
version = "3.13.2"

[python.dependencies]
ImageHash = "4.3.2"
matplotlib = "3.10.3"
numpy = "2.2.6"
Pillow = "11.3.0"
PyQt5 = "5.15.11"
PyQt5_sip = "12.17.0"
questionary = "2.1.0"
tqdm = "4.67.1"
customtkinter = "5.2.0"
