sonar.projectKey=yggdrasil-au_RemakeEngine
sonar.organization=yggdrasil-au
sonar.projectName=RemakeEngine
sonar.projectVersion=v2.3.1-A
sonar.host.url=https://sonarcloud.io

# Source/test layout for EngineNet (.NET)
sonar.sources=EngineNet/
sonar.tests=EngineNet.Tests/

# Exclusions (keep common non-source folders)
sonar.exclusions=runtime/**,**/venv/**,**/.venv/**,**/site-packages/**,**/build/**,**/dist/**,**/.tox/**,**/bin/**,**/obj/**

# Replace old Python coverage with .NET OpenCover coverage
sonar.cs.opencover.reportsPaths=EngineNet.Tests/TestResults/**/coverage.opencover.xml

# Optional: copy–paste detection exclusions
sonar.cpd.exclusions=runtime/**
