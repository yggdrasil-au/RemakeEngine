steps:
  - uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.11'

  - name: Install tox and dependencies
    run: pip install tox

  - name: Run tests and generate coverage
    run: tox -e py  # tox creates coverage.xml

  - name: Prepare coverage report
    run: |
      mkdir -p .sonarqube/out
      mv coverage.xml .sonarqube/out/coverage.xml

  - name: SonarQube Scan
    uses: SonarSource/sonarqube-scan-action@v5
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    with:
      args: >
        -Dsonar.python.coverage.reportPaths=.sonarqube/out/coverage.xml
        -Dsonar.exclusions=reverse_engineering/**
