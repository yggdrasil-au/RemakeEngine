# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will build, test, sign and package a WPF or Windows Forms desktop application
# built on .NET Core.
# To learn how to migrate your existing application to .NET Core,
# refer to https://docs.microsoft.com/en-us/dotnet/desktop-wpf/migration/convert-project-from-net-framework
#
# To configure this workflow:
#
# 1. Configure environment variables
# GitHub sets default environment variables for every workflow run.
# Replace the variables relative to your project in the "env" section below.
#
# 2. Signing
# Generate a signing certificate in the Windows Application
# Packaging Project or add an existing signing certificate to the project.
# Next, use PowerShell to encode the .pfx file using Base64 encoding
# by running the following Powershell script to generate the output string:
#
# $pfx_cert = Get-Content '.\SigningCertificate.pfx' -Encoding Byte
# [System.Convert]::ToBase64String($pfx_cert) | Out-File 'SigningCertificate_Encoded.txt'
#
# Open the output file, SigningCertificate_Encoded.txt, and copy the
# string inside. Then, add the string to the repo as a GitHub secret
# and name it "Base64_Encoded_Pfx."
# For more information on how to configure your signing certificate for
# this workflow, refer to https://github.com/microsoft/github-actions-for-desktop-apps#signing
#
# Finally, add the signing certificate password to the repo as a secret and name it "Pfx_Key".
# See "Build the Windows Application Packaging project" below to see how the secret is used.
#
# For more information on GitHub Actions, refer to https://github.com/features/actions
# For a complete CI/CD sample to get started with GitHub Action workflows for Desktop Applications,
# refer to https://github.com/microsoft/github-actions-for-desktop-apps

name: .NET Build, Test & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]     # create a release when you push a tag like v1.2.3
  #pull_request:
    #branches: [ "main" ]
  workflow_dispatch: {} # allow manual runs

jobs:
  build:
    name: Build & Test (${{ matrix.os }} | ${{ matrix.configuration }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-14]
        configuration: [Debug, Release]
    runs-on: ${{ matrix.os }}
    env:
      Solution_Name: RemakeEngine.sln
      # Limit to .NET 8 to avoid needing .NET 9 SDK
      ForceTFM: net8.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK 8.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        shell: bash
        run: dotnet restore "$Solution_Name" -p:TargetFramework=$ForceTFM

      - name: Build
        shell: bash
        run: dotnet build "$Solution_Name" -c "${{ matrix.configuration }}" --no-restore -p:TargetFramework=$ForceTFM

      - name: Discover tests
        id: discover_tests
        shell: bash
        run: |
          if find . -type f -name "*Tests.csproj" | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            find . -type f -name "*Tests.csproj" -print
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No test projects found (skipping dotnet test)."
          fi

      - name: Test
        if: steps.discover_tests.outputs.found == 'true'
        shell: bash
        run: dotnet test "$Solution_Name" -c "${{ matrix.configuration }}" --no-build -p:TargetFramework=$ForceTFM --verbosity normal

  release_matrix:
    name: Release build (${{ matrix.rid }} on ${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          # Linux
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          # macOS (Intel/x64 and Apple Silicon/arm64)
          - os: macos-13
            rid: osx-x64
          - os: macos-14
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    env:
      App_Project: EngineNet/EngineNet.csproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK 8.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (${{ matrix.rid }})
        shell: pwsh
        run: dotnet publish "$App_Project" -v:d -c Release -f net8.0 -r ${{ matrix.rid }} --self-contained true -o out/${{ matrix.rid }} -p:PublishSingleFile=true

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zipName = "EngineNet-${{ matrix.rid }}-${{ github.ref_name }}.zip"
          Compress-Archive -Path "out/${{ matrix.rid }}/*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package zip (Unix)
        if: runner.os != 'Windows'
        shell: pwsh
        run: |
          $zipName = "EngineNet-${{ matrix.rid }}-${{ github.ref_name }}.zip"
          (cd "out/${{ matrix.rid }}" && zip -q -r "../$zipName" .)
          mv "out/${{ matrix.rid }}/../$zipName" "$zipName"
          echo "ZIP_NAME=$zipName" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

  publish_release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: release_matrix
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: ls -laR dist

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          # Flatten artifacts into a single directory
          mkdir -p upload
          find dist -type f -name '*.zip' -exec cp {} upload/ \;
          echo "Assets:"; ls -1 upload
          gh release create "$tag" upload/*.zip \
            --title "$tag" \
            --notes "Automated multi-platform release for $tag"
