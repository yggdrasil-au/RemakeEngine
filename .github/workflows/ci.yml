jobs:
  ci:
    name: Lint, Test & Coverage (3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pylint pytest coverage

      # Make pylint non-blocking
      - name: Lint (pylint, non-blocking)
        continue-on-error: true
        run: |
          git ls-files -z -- '*.py' \
            ':(exclude,top)runtime/**' \
            ':(exclude,top)blender-4.0.2-windows-x64/**' \
            ':(exclude,top)dev/**' \
            ':(exclude,top)reverse_engineering_stuff/**' \
            ':(exclude,top).history/**' \
          | xargs -0 -r pylint

      - name: Tests + Coverage
        run: |
          coverage run -m pytest
          coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
