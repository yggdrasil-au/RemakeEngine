name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [ci]                 # wait for CI
    if: always()                # still run to report, even if earlier jobs fail
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # better blame/history for analysis
      - name: Sonar upload cloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
