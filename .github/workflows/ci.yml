name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: Build, Test, Sonar (.NET)
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force | Out-Null
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: SonarCloud Begin
        shell: powershell
        run: |
            .\.sonar\scanner\dotnet-sonarscanner begin `
              /k:"yggdrasil-au_RemakeEngine" `
              /o:"yggdrasil-au" `
              /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
              /d:sonar.cs.opencover.reportsPaths="EngineNet.Tests/TestResults/**/coverage.opencover.xml"

      - name: Restore (solution)
        shell: powershell
        run: |
          dotnet restore RemakeEngine.sln

      - name: Build (solution)
        shell: powershell
        run: |
          dotnet build RemakeEngine.sln --no-restore -c Release

      - name: Test with coverage (OpenCover, net8.0)
        shell: powershell
        run: |
            dotnet test EngineNet.Tests/EngineNet.Tests.csproj `
              --no-build -c Release -f net8.0 `
              --results-directory EngineNet.Tests/TestResults `
              --collect "XPlat Code Coverage" `
              -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: SonarCloud End
        shell: powershell
        run: .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Upload coverage artifact (OpenCover)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-opencover
          path: EngineNet.Tests/TestResults/**/coverage.opencover.xml
