sonar.projectKey=yggdrasil-au_RemakeEngine
sonar.organization=yggdrasil-au

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=RemakeEngine
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Exclude specific folders from analysis
sonar.exclusions=runtime/**, tests/**
#sonar.inclusions=

# Path to tests
#sonar.tests=
sonar.test.exclusions=runtime/**, tests/**
#sonar.test.inclusions=

# Exclusions for copy-paste detection
sonar.cpd.exclusions=runtime/**, tests/**
